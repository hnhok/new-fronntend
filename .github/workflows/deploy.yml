name: Deploy Frontend to Server

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Deploy to Server via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SERVER_PASSWORD }}
        script: |
          # 1. 初始化云服务器基建环境 (预防性安装 Git 和 Docker 等必备工具)
          sudo apt-get update -y || echo "Skip apt update"
          sudo apt-get install -y git curl || echo "Git/curl installed or failed"
          
          if ! command -v docker &> /dev/null; then
            echo "未检测到 Docker，开始自动为您安装..."
            curl -fsSL https://get.docker.com -o get-docker.sh
            sudo sh get-docker.sh
            sudo systemctl enable docker
            sudo systemctl start docker
            sudo usermod -aG docker $USER
            sudo curl -L "https://github.com/docker/compose/releases/download/v2.21.0/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
            sudo chmod +x /usr/local/bin/docker-compose
          fi
          
          mkdir -p /app/cms-frontend
          cd /app/cms-frontend
          
          # 2. 拉取源代码
          if [ -d ".git" ]; then
            sudo git pull origin master
          else
            sudo git clone https://github.com/hnhok/new-fronntend.git .
          fi
          
          # 3. 启动应用
          sudo docker-compose up -d --build frontend
