name: Deploy Frontend to Server

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Deploy to Server via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SERVER_PASSWORD }}
        script: |
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update -y || echo "Skip apt update"
          sudo apt-get install -y git curl docker.io || true
          sudo systemctl enable docker || true
          sudo systemctl start docker || true

          mkdir -p /app/cms-frontend
          cd /app/cms-frontend
          
          if [ -d ".git" ]; then
            sudo git pull origin master || (echo "Git pull failed, trying proxy..." && sudo git pull https://mirror.ghproxy.com/https://github.com/hnhok/new-fronntend.git master)
          else
            sudo git clone https://github.com/hnhok/new-fronntend.git . || sudo git clone https://mirror.ghproxy.com/https://github.com/hnhok/new-fronntend.git .
          fi
          
          sudo docker stop cms-frontend || true
          sudo docker rm cms-frontend || true
          sudo docker build -t cms-frontend .
          sudo docker run -d --name cms-frontend -p 80:80 -p 443:443 --restart always cms-frontend
